<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉄棒 着地チャレンジ V3 宇宙開発版</title>
<style>
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#14161c;color:#e8e6e0;margin:0;padding:16px;display:flex;justify-content:center;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  .wrap{max-width:720px;width:100%}
  h1{font-size:18px;font-weight:600;margin:0 0 12px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
  .card{background:#232833;border-radius:8px;padding:8px 10px}
  .card .lbl{font-size:11px;color:#8a8f98}
  .card .val{font-size:20px;font-weight:600}
  #total{color:#f0997b}
  .gsel{display:flex;gap:8px;margin-bottom:12px}
  .gbtn{flex:1;padding:10px;border-radius:8px;border:2px solid #3a4150;background:#232833;color:#c8ccd4;font-size:14px;font-weight:600;cursor:pointer}
  .gbtn.on{border-color:#f0997b;color:#f0997b}
  .gbtn small{display:block;font-weight:400;font-size:11px;color:#8a8f98}
  canvas{width:100%;display:block;border-radius:12px}
  .row{display:flex;gap:12px;align-items:center;margin-top:12px}
  #btn{flex:1;font-size:16px;padding:12px;border-radius:8px;border:none;background:#d85a30;color:#fff;font-weight:600;cursor:pointer}
  #btn:active{transform:scale(0.98)}
  #shareBtn{flex:1;font-size:15px;padding:10px;border-radius:8px;border:none;background:#2e7d5e;color:#fff;font-weight:600;cursor:pointer}
  #shareBtn:active{transform:scale(0.98)}
  #stats{font-size:12px;color:#8a8f98;margin-top:8px;line-height:1.6}
  .judge{min-width:250px}
  .judge .lbl{font-size:12px;color:#8a8f98}
  .judge .msg{font-size:15px;font-weight:600;min-height:24px}
  .help{font-size:13px;color:#8a8f98;margin-top:10px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <h1>🚀 鉄棒 着地チャレンジ V3 宇宙開発版</h1>
  <div class="gsel">
    <button class="gbtn on" data-g="earth">🌏 地球<small>標準重力 / D×2.2</small></button>
    <button class="gbtn" data-g="moon">🌙 月<small>重力1/6 滞空天国 / D×0.6</small></button>
    <button class="gbtn" data-g="jupiter">🪐 木星<small>重力2.5倍 地獄 / D×3.5</small></button>
  </div>
  <div class="cards">
    <div class="card"><div class="lbl">D得点(難度)</div><div class="val" id="dscore">-</div></div>
    <div class="card"><div class="lbl">E得点(実施)</div><div class="val" id="escore">-</div></div>
    <div class="card"><div class="lbl">合計</div><div class="val" id="total">-</div></div>
    <div class="card"><div class="lbl">ベスト</div><div class="val" id="best">0.0</div></div>
  </div>
  <canvas id="cv" width="672" height="380"></canvas>
  <div class="row">
    <button id="btn">スタート</button>
    <div class="judge">
      <div class="lbl">E審判(辛口)</div>
      <div class="msg" id="judge">──</div>
    </div>
  </div>
  <div class="row" id="shareRow" style="display:none">
    <button id="shareBtn">📋 記録を自慢する</button>
  </div>
  <div id="stats"></div>
  <div class="help">
    ① 重力を選んでスタート → 大車輪加速(粘るほど高難度)<br>
    ② ボタンか<b>画面タップ</b>(PCはスペースキー)で離手 → 空中で<b>左右スワイプ</b>(PCは←→キー)でひねり!1回+0.5点・最大5回<br>
    ③ 「今や!」が出たらもう一回タップで踏ん張り → まっすぐ立てたら高得点。宙返り×ひねりの組み合わせで技名認定!<br>
    合計 = D得点(宙返り数 × 重力係数 + ボーナス + ひねり×0.5)+ E得点(着地10点満点)− 天井修理費
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const btn=document.getElementById('btn'),judge=document.getElementById('judge');
const dEl=document.getElementById('dscore'),eEl=document.getElementById('escore'),tEl=document.getElementById('total'),bestEl=document.getElementById('best');
const shareRow=document.getElementById('shareRow'),shareBtn=document.getElementById('shareBtn'),statsEl=document.getElementById('stats');
const W=672,H=380,barX=170,barY=110,armL=48,groundY=330;
const GRAV={earth:{g:0.26,dMul:2.2,name:'地球'},moon:{g:0.045,dMul:0.6,name:'月'},jupiter:{g:0.65,dMul:3.5,name:'木星'}};
const STAMINA_LIM=100*Math.PI*2; // 腹筋の限界:累計100回転で回転が鈍る(実質、月専用の制限)
let gMode='earth';
let mode='idle',ang=0,angV=0,px=0,py=0,vx=0,vy=0,rot=0,rotV=0,rotStart=0,braced=false,best=0;
let dust=[],flips=0,dS=0,eS=0,tot=0,shake=0,cam={y:0,s:1},stars=[],trail=[];
let twists=0,twistAnim=0,swipeActive=false,swipeX=0,lastWaza=null;
const TWIST_FRAMES=18,TWIST_MAX=5; // ひねりは5回まで(首の限界)
let confetti=[],cheer=0,frameN=0,lastTier='',tierStreak=0;
const CONF_COLORS=['#f0997b','#5dcaa5','#e8b04a','#5d8ac9','#b85d8a','#f5f3ee'];
const CROWD_COLORS=['#c9a34e','#5d8ac9','#b85d8a','#6db07a','#c96b4e','#8a7ac9'];

// ===== 効果音(Web Audio 自前生成・外部ファイルなし) =====
let AC=null;
function ensureAudio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
  if(AC&&AC.state==='suspended')AC.resume(); // iOS: ユーザー操作内でresumeが必要
}
function noiseBuf(dur){
  const b=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  return b;
}
function sfxWhoosh(){ // 離手のヒュッ
  if(!AC)return;const t=AC.currentTime;
  const src=AC.createBufferSource();src.buffer=noiseBuf(0.35);
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.Q.value=2.5;
  bp.frequency.setValueAtTime(500,t);bp.frequency.exponentialRampToValueAtTime(2400,t+0.25);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.45,t+0.06);g.gain.exponentialRampToValueAtTime(0.0001,t+0.33);
  src.connect(bp);bp.connect(g);g.connect(AC.destination);src.start(t);
}
function sfxTwist(){ // ひねりのシュッ
  if(!AC)return;const t=AC.currentTime;
  const src=AC.createBufferSource();src.buffer=noiseBuf(0.12);
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.Q.value=3;
  bp.frequency.setValueAtTime(1800,t);bp.frequency.exponentialRampToValueAtTime(3600,t+0.1);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.25,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
  src.connect(bp);bp.connect(g);g.connect(AC.destination);src.start(t);
}
function sfxCrash(){ // 天井破壊ガシャーン
  if(!AC)return;const t=AC.currentTime;
  const src=AC.createBufferSource();src.buffer=noiseBuf(0.5);
  const lp=AC.createBiquadFilter();lp.type='lowpass';
  lp.frequency.setValueAtTime(4000,t);lp.frequency.exponentialRampToValueAtTime(250,t+0.45);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
  src.connect(lp);lp.connect(g);g.connect(AC.destination);src.start(t);
  const o=AC.createOscillator();o.type='square';
  o.frequency.setValueAtTime(90,t);o.frequency.exponentialRampToValueAtTime(35,t+0.3);
  const g2=AC.createGain();g2.gain.setValueAtTime(0.35,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
  o.connect(g2);g2.connect(AC.destination);o.start(t);o.stop(t+0.4);
}
function sfxLand(clean){ // 着地: ピタならタン!、崩れたらドスン
  if(!AC)return;const t=AC.currentTime;
  const src=AC.createBufferSource();src.buffer=noiseBuf(clean?0.06:0.18);
  const g=AC.createGain();
  g.gain.setValueAtTime(clean?0.5:0.55,t);g.gain.exponentialRampToValueAtTime(0.0001,t+(clean?0.07:0.2));
  src.connect(g);g.connect(AC.destination);src.start(t);
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(clean?180:100,t);o.frequency.exponentialRampToValueAtTime(clean?80:40,t+0.12);
  const g2=AC.createGain();g2.gain.setValueAtTime(0.4,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
  o.connect(g2);g2.connect(AC.destination);o.start(t);o.stop(t+0.16);
}
function sfxFanfare(){ // 満点ファンファーレ
  if(!AC)return;const t=AC.currentTime;
  const notes=[[523.25,0,0.14],[659.25,0.13,0.14],[783.99,0.26,0.14],[1046.5,0.39,0.5],[783.99,0.39,0.5]];
  notes.forEach(n=>{
    const o=AC.createOscillator();o.type='square';o.frequency.value=n[0];
    const g=AC.createGain();
    g.gain.setValueAtTime(0.0001,t+n[1]);g.gain.exponentialRampToValueAtTime(0.18,t+n[1]+0.02);
    g.gain.setValueAtTime(0.18,t+n[1]+n[2]-0.05);g.gain.exponentialRampToValueAtTime(0.0001,t+n[1]+n[2]);
    o.connect(g);g.connect(AC.destination);o.start(t+n[1]);o.stop(t+n[1]+n[2]+0.02);
  });
}
function spawnConfetti(){
  for(let i=0;i<90;i++)confetti.push({
    x:px+(Math.random()-0.5)*500,y:-60-Math.random()*220,
    vx:(Math.random()-0.5)*1.6,vy:1+Math.random()*2.2,
    rot:Math.random()*6.3,rotV:(Math.random()-0.5)*0.3,
    c:CONF_COLORS[i%6],w:5+Math.random()*4,h:3+Math.random()*3,l:1
  });
}
const MAT_L=200,MAT_R=530,ROOF_Y=-130;
let roofBroken=false,holeX=0,debris=[],matMiss=false,staminaOut=false;
const fg='#e8e6e0',mut='#8a8f98',accent='#f0997b',teal='#5dcaa5',mat='#3a4a5a';
for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:-Math.random()*4000-300,r:Math.random()*1.6+0.4});

// ===== 記録の永続化(localStorage) =====
const STORE_KEY='tetsubo_records_v1';
let rec={best:{earth:0,moon:0,jupiter:0},bestTotal:0,bestWaza:null,plays:0,roofBreaks:0};
try{const s=localStorage.getItem(STORE_KEY);if(s){const j=JSON.parse(s);rec=Object.assign(rec,j);rec.best=Object.assign({earth:0,moon:0,jupiter:0},j.best||{});}}catch(e){}
function saveRec(){try{localStorage.setItem(STORE_KEY,JSON.stringify(rec));}catch(e){}}
const BASE_LABEL={earth:'標準重力 / D×2.2',moon:'重力1/6 滞空天国 / D×0.6',jupiter:'重力2.5倍 地獄 / D×3.5'};
function updateStats(){
  const yen=rec.roofBreaks*50000; // 修理費0.5点=5万円換算のギャグ
  statsEl.textContent='通算 '+rec.plays+'回'
    +(rec.bestWaza?' / 最高技: '+rec.bestWaza.name+' ['+rec.bestWaza.rank+']':'')
    +(rec.roofBreaks>0?' / 🏚 天井修理費 累計請求額 ¥'+yen.toLocaleString()+'('+rec.roofBreaks+'回分)※体育館事務局より':'');
  document.querySelectorAll('.gbtn').forEach(b=>{
    const g=b.dataset.g,bv=rec.best[g]||0;
    b.querySelector('small').textContent=BASE_LABEL[g]+(bv>0?' / ベスト'+bv.toFixed(1):'');
  });
}
best=rec.bestTotal||0;
bestEl.textContent=best.toFixed(1);
updateStats();

document.querySelectorAll('.gbtn').forEach(b=>b.addEventListener('click',()=>{
  if(mode==='swing'||mode==='air')return;
  gMode=b.dataset.g;
  document.querySelectorAll('.gbtn').forEach(x=>x.classList.toggle('on',x===b));
}));

function reset(){
  mode='swing';ang=0.2;angV=0.05;rot=0;braced=false;dust=[];shake=0;cam={y:0,s:1};trail=[];
  roofBroken=false;debris=[];matMiss=false;staminaOut=false;
  twists=0;twistAnim=0;swipeActive=false;lastWaza=null;
  confetti=[];cheer=0;
  judge.textContent='──';dEl.textContent='-';eEl.textContent='-';tEl.textContent='-';
  shareRow.style.display='none';
  btn.textContent='離手!(スペース可)';
}
function release(){
  const hx=barX+Math.sin(ang)*armL,hy=barY+Math.cos(ang)*armL;
  px=hx;py=hy;
  const sp=Math.abs(angV)*armL*0.020;
  vx=Math.max(1.4,Math.cos(ang)*sp*Math.sign(angV));
  vy=-Math.sin(ang)*sp*Math.sign(angV)-3.2-Math.abs(angV)*28;
  if(vy>-2.5)vy=-2.5;
  rot=ang;rotStart=rot;rotV=0.14+Math.abs(angV)*2.6;
  mode='air';btn.textContent='着地の踏ん張り!';
  sfxWhoosh();
}
function brace(){if(mode==='air'&&!braced){braced=true;rotV*=0.5;}}
function twist(){
  if(mode!=='air'||braced||twists>=TWIST_MAX||twistAnim>0)return;
  twists++;twistAnim=TWIST_FRAMES;
  ensureAudio();sfxTwist();
}
// 宙返り数×ひねり数 → 技名(Gコード風の難度表記つき)
function wazaName(f,t){
  if(f>=10&&t>=3)return{name:'ハマー2',rank:'裏H難度・FIG審議拒否'};
  if(f>=10)return{name:'重力への反逆',rank:'I難度(規定外)'};
  if(f>=5&&t>=1)return{name:'ハマー',rank:'H難度'};
  if(f>=6)return{name:'零重力大車輪',rank:'G難度'};
  if(f>=2&&f<3&&t>=2)return{name:'新月面',rank:'G難度'};
  if(f>=5)return{name:'クインテュプル',rank:'F難度'};
  if(f>=4)return{name:t>=1?'クワッドひねり':'クワッド宙',rank:'F難度(人類初)'};
  if(f>=3)return{name:t>=1?'トリプルひねり宙':'トリプル宙',rank:t>=1?'F難度':'E難度'};
  if(f>=2)return{name:t>=1?'ダブルひねり':'ダブル宙',rank:t>=1?'E難度':'D難度'};
  if(f>=1)return{name:t>=2?'宙返り2回ひねり':t>=1?'ひねり宙返り':'後方宙返り',rank:t>=2?'D難度':t>=1?'C難度':'B難度'};
  if(f>=0.5)return{name:'半宙(危な!)',rank:'A難度'};
  return{name:'飛び降り',rank:'難度なし(勇気だけA)'};
}
function land(){
  mode='done';shake=8;
  for(let i=0;i<16;i++)dust.push({x:px+(Math.random()-0.5)*34,y:groundY-6,vx:(Math.random()-0.5)*3,vy:-Math.random()*2.5,l:1});
  const raw=Math.abs(rot-rotStart);
  flips=Math.max(0,Math.round(raw/(Math.PI*2)*2)/2);
  const bonus=flips>=10?8.0:flips>=8?5.0:flips>=6?3.0:flips>=5?2.0:flips>=4?1.0:flips>=3?0.5:0;
  dS=(flips<=0.5?0.4:(flips*1.0+bonus)*GRAV[gMode].dMul)+twists*0.5;
  dS=Math.round(dS*10)/10;
  lastWaza=wazaName(flips,twists);
  let a=((rot%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  let dev=Math.min(Math.abs(a),Math.abs(a-Math.PI*2));dev=Math.min(dev,Math.PI);
  if(dev<0.14)dev=0; // 完璧許容窓
  eS=Math.max(0,10-dev*4.8-(braced?0:2.0));
  matMiss=(px<MAT_L||px>MAT_R);
  if(matMiss)eS=Math.max(0,eS-4.0);
  eS=Math.round(eS*10)/10;
  tot=dS+eS-(roofBroken?0.5:0);
  tot=Math.round(tot*10)/10;
  sfxLand(eS>=7);
  if(eS>=9.5&&!matMiss){sfxFanfare();spawnConfetti();cheer=240;}
  dEl.textContent=dS.toFixed(1);eEl.textContent=eS.toFixed(1);tEl.textContent=tot.toFixed(1);
  const fTxt=flips>=1?flips+'回宙':'飛び降り';
  const gN=GRAV[gMode].name;
  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  let msg;
  if(matMiss){
    msg=pick([
      fTxt+'は良かったのにマット外して床にドーン!マットの気持ち考えたことあるか!?',
      'マットどこ行った思たら、キミが行き先間違えとるやん。GPSつけとくか?',
      '床「なんで俺やねん」。マット「なんで俺ちゃうねん」。全員被害者や',
      '着地位置ズレすぎて観客席のおばちゃんが荷物まとめ始めたで',
      '体育館の床、キミの形にへこんどるわ。記念プレートにしとこか'
    ])+'(場外 -4.0)';
  }
  else if(eS>=9.5&&flips>=10)msg=pick([
    gN+'で'+fTxt+'ピタァ!FIG緊急会議、五輪憲章改訂、教科書掲載、ノーベル回転賞や!',
    fTxt+'完璧着地…審判団、採点表破り捨てて拍手しとる。前代未聞や',
    '10回宙!?もう人間国宝通り越して世界遺産や。ユネスコに電話しとくわ'
  ]);
  else if(eS>=9.5&&flips>=8)msg=pick([
    fTxt+'!?ニュートンが墓から二度見しとるわ',
    fTxt+'ピタ止め。NASAからスカウトの電話や。出とき',
    '重力「俺の負けや」。'+fTxt+'完璧着地、物理法則が土下座しとる'
  ]);
  else if(eS>=9.5&&flips>=6)msg=pick([
    fTxt+'制圧。もう体操ちゃう、航空事業や。国交省に届け出しときや',
    fTxt+'をピタリ。鳥が「ワシより飛んどるやん」て凹んどったで',
    '管制塔「未確認飛行物体は体操選手と判明」。'+fTxt+'完璧や'
  ]);
  else if(eS>=9.5&&flips>=5)msg=pick([
    fTxt+'ピタ止め!人類卒業!新技「ハマー」、正式コード化申請しとくわ',
    fTxt+'!採点基準表の右端突き破ったわ。増刷や増刷',
    '解説者、語彙力失って「すごい」しか言うてへん。'+fTxt+'完璧や'
  ]);
  else if(eS>=9.5)msg=pick([
    'ピタァァ!!会場の空調まで止まった。この静寂が満点の音や',
    '釘や。マットに釘打ったみたいに止まった。工具箱出身か?',
    '完璧すぎて審判が減点する場所探して10分固まっとる'
  ]);
  else if(eS>=8.5)msg=pick([
    fTxt+'から小ホップ一丁。惜しい!審判の眉毛が2ミリ動いたで',
    'ちょいホップ。あと靴半分や。靴のサイズ縮めてくるか?',
    '95点の男。あとちょっとやのにキミはいつもそうや(褒めてる)'
  ]);
  else if(eS>=7)msg=pick([
    '一歩デター。マットに根性見せんかい',
    'とっとっと…て一歩。散歩ちゃうねんぞ、ここは競技場や',
    '着地後の一歩、あれ何?コンビニでも寄るつもりやった?'
  ]);
  else if(eS>=5)msg=pick([
    'グラングランやん。観客席のおばちゃん、目ぇつぶっとったで',
    '洗濯機の中の靴下みたいな着地やな。まず回転数の管理からや',
    'よろけすぎて審判が「地震?」て天井見とったわ'
  ]);
  else if(eS>=2.5)msg=pick([
    '尻もちドーン。どや、マットの座り心地は',
    '見事な着席。ここ椅子ちゃうぞ、競技マットや',
    '尻から着地する新技かと思ったら、ただの尻もちやった'
  ]);
  else msg=gMode==='jupiter'?pick([
    '木星の重力に完敗。キレイにプレス加工されとるやん',
    '木星さん容赦なし。キミ今、たこ焼きより平べったいで'
  ]):pick([
    '着地(物理)。国際救助隊呼んどいたで',
    '背中から大地に挨拶。地球「痛いのはこっちや」',
    '着地というより墜落。ブラックボックス回収班、出動や'
  ]);
  // 連続同ティア検知(3回以上同じ結果で特殊セリフに差し替え)
  const tier=matMiss?'out':eS>=9.5?'perfect':eS>=8.5?'hop':eS>=7?'step':eS>=5?'wobble':eS>=2.5?'butt':'crash';
  if(tier===lastTier)tierStreak++;else{tierStreak=1;lastTier=tier;}
  if(tierStreak>=3){
    const streakMsg={
      out:[tierStreak+'回連続場外。体育館の外に住民票移しとくか?','また場外かい。もう主催者が保険入り直したわ','場外'+tierStreak+'連発。マット「俺、避けられとる?」て泣いとるで'],
      perfect:[tierStreak+'連続ピタ。もう審判いらんやん。俺の存在意義どこや','また満点かい。採点表がハンコになってもうたわ','ピタ'+tierStreak+'連発。会場が「知ってた」みたいな空気なっとるで'],
      hop:['3連続小ホップ。あと靴半分がそんなに遠いか','惜しいの'+tierStreak+'連発。「惜しい大賞」ならぶっちぎり優勝や','またホップ。カンガルーの血、入っとる?'],
      step:['3連続一歩。ここ散歩コースちゃうぞ','また一歩歩いたな。もう歩き癖ついとるやん。競歩に転向するか?','一歩'+tierStreak+'連発。着地後の寄り道、有料にすんぞ'],
      wobble:['3連続グラグラ。洗濯機の気持ち、だいぶわかってきたやろ','またグラグラ。気象庁から「揺れの原因判明」て発表出たで','グラグラ'+tierStreak+'回目。観客がもう船酔いしとる'],
      butt:['3連続尻もちて。もうマットと友達やん。ダチ超えて夫婦や','尻もち'+tierStreak+'連発。マット「指定席、温めといたで」','また尻もち。ここ椅子ちゃう言うてるやろ!マットが座布団に転職考えとるわ'],
      crash:['3連続墜落。国際救助隊、もう常駐しとるで','墜落'+tierStreak+'回目。地面「そろそろ俺が謝りたい」','毎回背中から来るな。マットがトラウマなって夜しか眠れんらしいわ']
    };
    msg=pick(streakMsg[tier])+(matMiss?'(場外 -4.0)':'');
  }
  if(staminaOut)msg+='(100回転で腹筋が営業終了しとったで)';
  if(!braced&&!matMiss)msg+='(踏ん張り忘れ -2.0)';
  if(roofBroken)msg+='(天井修理費 ▲0.5)';
  if(gMode==='moon'&&eS>=9.5)msg+=' ※月やけどな';
  judge.textContent=msg;
  if(tot>best){best=tot;bestEl.textContent=best.toFixed(1);}
  // 記録更新(通算・惑星別・最高技・天井修理費)
  rec.plays++;
  if(roofBroken)rec.roofBreaks++;
  if(tot>rec.best[gMode])rec.best[gMode]=tot;
  if(tot>rec.bestTotal)rec.bestTotal=tot;
  const wDiff=flips+twists*0.5;
  if(lastWaza&&(!rec.bestWaza||wDiff>(rec.bestWaza.diff||0)))rec.bestWaza={name:lastWaza.name,rank:lastWaza.rank,diff:wDiff};
  saveRec();updateStats();
  shareRow.style.display='flex';
  shareBtn.textContent='📋 記録を自慢する';
  btn.textContent='もう一回';
}
function step(){
  if(mode==='swing'){
    // 本物の大車輪:常に一方向回転。下降局面で加速、上昇局面で減速、蹴りで毎周スピードアップ
    angV+=0.0035+0.004*Math.sin(ang);
    if(angV<0.045)angV=0.045;
    if(angV>0.42)angV=0.42; // 人体の限界(いちおう)
    ang+=angV;
  }
  else if(mode==='air'){
    const nearGround=vy>0&&(groundY-py)<150;
    const ts=nearGround?0.35:1;
    vy+=GRAV[gMode].g*ts;px+=vx*ts;py+=vy*ts;vx*=0.985;
    if(!roofBroken&&vy<0&&py<ROOF_Y){
      roofBroken=true;holeX=px;shake=10;
      for(let i=0;i<12;i++)debris.push({x:px+(Math.random()-0.5)*50,y:ROOF_Y,vx:(Math.random()-0.5)*4,vy:Math.random()*2+1,r:Math.random()*5+2,rot:Math.random()*6,l:1});
      sfxCrash();
    }
    if(!braced&&Math.abs(rot-rotStart)>STAMINA_LIM){staminaOut=true;rotV*=0.96;}
    if(braced&&nearGround){
      const target=Math.round(rot/(Math.PI*2))*(Math.PI*2);
      rot+=(target-rot)*0.12+rotV*ts;rotV*=0.92;
    }else if(braced){rot+=rotV*ts;rotV*=0.995;}
    else{rot+=rotV*ts;}
    if(twistAnim>0)twistAnim--;
    if(px>W*3)px=W*3;
    trail.push({x:px,y:py,l:0.5});
    if(trail.length>26)trail.shift();
    if(py>=groundY-52){py=groundY-52;land();}
  }
  trail.forEach(t=>t.l-=0.018);trail=trail.filter(t=>t.l>0);
  debris.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vy+=0.2;d.rot+=0.1;if(d.y>groundY-4){d.y=groundY-4;d.vy=0;d.vx*=0.8;}});
  const targetY=mode==='air'||mode==='done'?Math.min(0,py-140):0;
  const span=groundY-Math.min(py,groundY)+120;
  const targetS=mode==='air'?Math.min(1,Math.max(0.25,300/span)):1;
  cam.y+=(targetY-cam.y)*0.08;
  cam.s+=(targetS-cam.s)*0.06;
  dust.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vy+=0.1;d.l-=0.03;});
  dust=dust.filter(d=>d.l>0);
  confetti.forEach(c=>{
    c.x+=c.vx+Math.sin(frameN*0.1+c.rot)*0.6;c.y+=c.vy;c.rot+=c.rotV;
    if(c.y>groundY-3){c.y=groundY-3;c.vy=0;c.vx=0;c.rotV=0;c.l-=0.02;}
  });
  confetti=confetti.filter(c=>c.l>0);
  if(cheer>0)cheer--;
  frameN++;
  if(shake>0)shake*=0.85;
  draw();requestAnimationFrame(step);
}
function drawGym(x,y,r,pose,sx){
  ctx.save();ctx.translate(x,y);ctx.rotate(r);
  if(sx!==undefined&&sx!==1)ctx.scale(sx,1); // ひねり:体の横幅を振動させて回転を表現
  const skin='#e8b48a',skinB='#cf9b74',suit='#f5f3ee',suitB='#d9d6cd',red='#d9382c',hair='#26262b',shoe='#3a3a40';
  function seg(pts,w,c){
    ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke();
  }
  function dot(x,y,r2,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r2,0,Math.PI*2);ctx.fill();}
  let backArm,frontArm,backLeg,frontLeg,handsChalk=false;
  if(pose==='hang'){
    backArm=[[-2,-16],[-3,-34],[-5,-50]];frontArm=[[2,-16],[3,-34],[5,-50]];
    backLeg=[[-2,6],[-2,24],[-1,40]];frontLeg=[[2,6],[3,24],[5,40]];
    handsChalk=true;
  }else if(pose==='tuck'){
    backLeg=[[-2,6],[14,-4],[6,10]];frontLeg=[[2,6],[18,-2],[9,13]];
    backArm=[[-2,-16],[6,-8],[13,-3]];frontArm=[[2,-16],[9,-7],[16,-1]];
  }else{ // stand / salute
    backArm=[[-2,-16],[-9,-28],[-15,-42]];frontArm=[[2,-16],[9,-28],[15,-42]];
    backLeg=[[-2,6],[-3,22],[-4,38]];frontLeg=[[2,6],[3,22],[4,38]];
  }
  // 奥側の手足(暗め)
  seg(backLeg,6,suitB);dot(backLeg[2][0],backLeg[2][1],3.2,shoe);
  seg(backArm,4.5,skinB);
  // 胴体(ユニフォーム)
  seg([[0,6],[0,-16]],15,suit);
  seg([[0,-9],[0,-14]],15,red); // 胸の赤ライン
  // 手前側の手足
  seg(frontLeg,6,suit);dot(frontLeg[2][0],frontLeg[2][1],3.4,shoe);
  seg(frontArm,4.5,skin);
  // 手(チョーク)
  if(handsChalk){dot(backArm[2][0],backArm[2][1],3,'#fff');dot(frontArm[2][0],frontArm[2][1],3,'#fff');}
  else{dot(frontArm[2][0],frontArm[2][1],2.4,skin);dot(backArm[2][0],backArm[2][1],2.4,skinB);}
  // 頭
  dot(0,-26,7,skin);
  ctx.fillStyle=hair;ctx.beginPath();ctx.arc(0,-26,7.2,Math.PI*0.95,Math.PI*2.05);ctx.fill();
  ctx.fillStyle='#2a2a2e';ctx.beginPath();ctx.arc(2.6,-26,0.9,0,Math.PI*2);ctx.fill(); // 目
  ctx.restore();
}
function skyColor(){
  const alt=Math.max(0,groundY-py);
  const t=Math.min(1,alt/2500);
  if(gMode==='moon')return '#0a0a12';
  const r=Math.round(32-24*t),g=Math.round(36-28*t),b=Math.round(44-24*t);
  return 'rgb('+r+','+g+','+b+')';
}
function draw(){
  ctx.fillStyle=(mode==='air'||mode==='done')?skyColor():'#20242c';
  ctx.fillRect(0,0,W,H);
  const alt=Math.max(0,groundY-py);
  if((mode==='air'&&alt>600)||gMode==='moon'){
    ctx.fillStyle='#fff';
    stars.forEach(s=>{
      const sy=(s.y-cam.y)*cam.s+H*0.2;
      if(sy>0&&sy<H){ctx.globalAlpha=Math.min(1,(alt-400)/800+(gMode==='moon'?0.5:0));ctx.beginPath();ctx.arc(s.x,sy,s.r,0,Math.PI*2);ctx.fill();}
    });
    ctx.globalAlpha=1;
  }
  ctx.save();
  if(shake>0.3)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.translate(W*0.5,H*0.55);
  ctx.scale(cam.s,cam.s);
  ctx.translate(-W*0.5,-H*0.55-cam.y);
  // ===== 体育館 =====
  // 壁(天井から床まで)
  ctx.fillStyle='#2b2f3a';ctx.fillRect(-W,ROOF_Y,W*5,groundY-ROOF_Y+8);
  ctx.fillStyle='#252933';ctx.fillRect(-W,ROOF_Y,W*5,90); // 壁上部の暗め帯
  // 横断幕
  ctx.fillStyle='#8e2f2a';ctx.fillRect(330,ROOF_Y+34,300,34);
  ctx.fillStyle='#f5f3ee';ctx.font='600 17px sans-serif';
  ctx.fillText('第99回 西日本鉄棒王決定戦',352,ROOF_Y+57);
  ctx.fillStyle=mut;ctx.font='11px sans-serif';
  ctx.fillText('🚭 館内禁煙・場外飛行禁止',352,ROOF_Y+86);
  // 観客席(左側)。満点時は立ち上がって腕を振る
  for(let r2=0;r2<3;r2++)for(let c2=0;c2<6;c2++){
    const i2=r2*6+c2;
    const lift=cheer>0?4+Math.abs(Math.sin(frameN*0.22+i2))*7:0;
    const hx2=-160+c2*34,hy2=groundY-30-r2*34-lift;
    if(cheer>0){ // 振り上げた腕
      const sw=Math.sin(frameN*0.3+i2);
      ctx.strokeStyle='#e8b48a';ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(hx2-6,hy2+6);ctx.lineTo(hx2-11,hy2-6-sw*4);
      ctx.moveTo(hx2+6,hy2+6);ctx.lineTo(hx2+11,hy2-6+sw*4);
      ctx.stroke();
    }
    ctx.fillStyle=CROWD_COLORS[i2%6];
    ctx.beginPath();ctx.arc(hx2,hy2,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a3f4c';ctx.fillRect(hx2-8,hy2+8,16,14);
  }
  // 天井の梁(穴が開いてたら2分割)
  ctx.fillStyle='#454b5a';
  if(roofBroken){
    ctx.fillRect(-W,ROOF_Y-14,holeX-45+W,14);
    ctx.fillRect(holeX+45,ROOF_Y-14,W*5,14);
    // 穴のギザギザ
    ctx.fillStyle='#454b5a';
    ctx.beginPath();
    ctx.moveTo(holeX-45,ROOF_Y-14);ctx.lineTo(holeX-30,ROOF_Y-2);ctx.lineTo(holeX-18,ROOF_Y-12);
    ctx.lineTo(holeX-45,ROOF_Y-14);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(holeX+45,ROOF_Y-14);ctx.lineTo(holeX+28,ROOF_Y-4);ctx.lineTo(holeX+16,ROOF_Y-12);
    ctx.lineTo(holeX+45,ROOF_Y-14);ctx.fill();
  }else{
    ctx.fillRect(-W,ROOF_Y-14,W*5,14);
  }
  // 天井の照明
  for(let i=0;i<4;i++){ctx.fillStyle='#e8dfa8';ctx.fillRect(60+i*180,ROOF_Y+2,50,6);}
  // 破片
  ctx.fillStyle='#454b5a';
  debris.forEach(d=>{ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot);ctx.fillRect(-d.r,-d.r/2,d.r*2,d.r);ctx.restore();});
  // 紙吹雪(満点時)
  confetti.forEach(c=>{
    ctx.save();ctx.globalAlpha=Math.max(0,c.l);
    ctx.translate(c.x,c.y);ctx.rotate(c.rot);
    ctx.fillStyle=c.c;ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    ctx.restore();
  });
  ctx.globalAlpha=1;
  // ===== 器具 =====
  ctx.strokeStyle=mut;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(barX-70,groundY);ctx.lineTo(barX-55,barY);ctx.moveTo(barX+70,groundY);ctx.lineTo(barX+55,barY);ctx.stroke();
  ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(barX-58,barY);ctx.lineTo(barX+58,barY);ctx.stroke();
  // マット(有限!ここに落ちな死ぬで)
  ctx.fillStyle=gMode==='moon'?'#555c68':mat;ctx.fillRect(MAT_L,groundY-8,MAT_R-MAT_L,16);
  ctx.fillStyle='#5d7a9c';ctx.fillRect(MAT_L,groundY-8,MAT_R-MAT_L,4);
  ctx.strokeStyle=mut;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-W,groundY+8);ctx.lineTo(W*4,groundY+8);ctx.stroke();
  ctx.fillStyle=mut;ctx.font='12px sans-serif';ctx.fillText(gMode==='moon'?'月面マット(静かの海)':gMode==='jupiter'?'着地マット(高密度仕様)':'着地マット',MAT_L+90,groundY+26);
  if(mode==='idle'){
    ctx.fillStyle=fg;ctx.font='600 18px sans-serif';ctx.fillText('重力を選んでスタートや',250,170);
  }else if(mode==='swing'){
    const hx=barX+Math.sin(ang)*armL,hy=barY+Math.cos(ang)*armL;
    const cx2=barX+Math.sin(ang)*(armL+20),cy2=barY+Math.cos(ang)*(armL+20);
    ctx.strokeStyle=accent;ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(barX,barY);ctx.lineTo(hx,hy);ctx.stroke();
    drawGym(cx2,cy2,-ang+Math.PI,'hang');
  }else{
    ctx.strokeStyle=accent;
    trail.forEach(t=>{ctx.globalAlpha=t.l*0.5;ctx.lineWidth=2;ctx.beginPath();ctx.arc(t.x,t.y,16,0,Math.PI*2);ctx.stroke();});
    ctx.globalAlpha=1;
    let twSx=1;
    if(twistAnim>0){
      const p=1-twistAnim/TWIST_FRAMES;
      twSx=Math.cos(p*Math.PI*2);
      if(Math.abs(twSx)<0.08)twSx=twSx<0?-0.08:0.08;
    }
    drawGym(px,py,rot,mode==='air'&&!braced?'tuck':'stand',twSx);
  }
  ctx.fillStyle=mut;
  dust.forEach(d=>{ctx.globalAlpha=d.l;ctx.beginPath();ctx.arc(d.x,d.y,3,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  ctx.restore();
  if(mode==='swing'){
    const spd=Math.min(1,Math.abs(angV)/0.38);
    const est=Math.round(Math.min(10,spd*11)*2)/2;
    ctx.fillStyle=mut;ctx.font='12px sans-serif';ctx.fillText('スピード',500,30);
    ctx.strokeStyle=mut;ctx.strokeRect(500,40,140,10);
    ctx.fillStyle=spd>0.9?'#e24b4a':spd>0.7?teal:accent;ctx.fillRect(500,40,140*spd,10);
    ctx.fillStyle=fg;ctx.font='600 13px sans-serif';ctx.fillText('予想: 約'+est+'回宙'+(spd>0.9?' ⚠危険域':''),500,72);
  }
  if(mode==='air'){
    const altM=Math.round(alt/34*10)/10;
    const f=Math.abs(rot-rotStart)/(Math.PI*2);
    let zone=altM>120?'🛰 衛星軌道':altM>80?'🌌 成層圏':altM>40?'✈ 巡航高度':'';
    ctx.fillStyle=teal;ctx.font='600 14px sans-serif';
    ctx.fillText('回転: '+f.toFixed(1)+'周 / ひねり: '+twists+(twists>=TWIST_MAX?'(首の限界)':''),20,30);
    ctx.fillStyle=accent;
    ctx.fillText('高度: '+altM+'m '+zone,20,52);
    if(roofBroken){ctx.fillStyle='#e8b04a';ctx.font='600 13px sans-serif';ctx.fillText('🏚 天井突破(修理費 ▲0.5)',20,74);}
    if(staminaOut){ctx.fillStyle='#e24b4a';ctx.font='600 13px sans-serif';ctx.fillText('💪 腹筋の限界!回転が鈍っとる!',20,roofBroken?96:74);}
    if(vy>0&&(groundY-py)<150&&!braced){
      ctx.fillStyle='#e24b4a';ctx.font='600 18px sans-serif';
      ctx.fillText('⏱ 今や!踏ん張れ!!',W/2-80,40);
    }
  }
  if(mode==='done'){
    ctx.fillStyle=fg;ctx.font='600 28px sans-serif';ctx.fillText(tot.toFixed(1)+' 点',290,60);
    ctx.font='13px sans-serif';ctx.fillStyle=mut;
    ctx.fillText('D '+dS.toFixed(1)+' + E '+eS.toFixed(1)+' @'+GRAV[gMode].name,296,82);
    if(lastWaza){ctx.fillStyle=teal;ctx.font='600 15px sans-serif';ctx.fillText('技: '+lastWaza.name+' ['+lastWaza.rank+']',290,104);}
  }
}
function act(){
  ensureAudio();
  if(mode==='idle'||mode==='done')reset();
  else if(mode==='swing')release();
  else if(mode==='air')brace();
}
// ===== 記録の自慢(クリップボード) =====
function fallbackCopy(t,done){
  const ta=document.createElement('textarea');
  ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);done();
}
function copyText(t,done){
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(done,()=>fallbackCopy(t,done));
  else fallbackCopy(t,done);
}
shareBtn.addEventListener('click',()=>{
  if(mode!=='done')return;
  const emoji={earth:'🌏',moon:'🌙',jupiter:'🪐'}[gMode];
  const t='【鉄棒着地チャレンジ】'+emoji+GRAV[gMode].name+'で'+tot.toFixed(1)+'点!'
    +(lastWaza?' 技:'+lastWaza.name+'['+lastWaza.rank+']':'')
    +(roofBroken?' (天井は壊した)':'')
    +' おまえも跳んでみ→ https://makenico.github.io/tetsubo-game-iphone/';
  copyText(t,()=>{
    shareBtn.textContent='✅ コピーしたで!SNSに貼り付けや';
    setTimeout(()=>{shareBtn.textContent='📋 記録を自慢する';},2000);
  });
});

btn.addEventListener('click',act);
// スマホ:キャンバスタップでも操作OK(touchstartで即反応)
// 滞空中の高空だけはスワイプ判定に切り替える(着地直前「今や!」はタップ即踏ん張りを維持)
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const highAir=mode==='air'&&!braced&&!(vy>0&&(groundY-py)<150);
  if(highAir){swipeActive=true;swipeX=e.touches[0].clientX;}
  else act();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  if(!swipeActive)return;
  e.preventDefault();
  const x=e.touches[0].clientX;
  if(Math.abs(x-swipeX)>=36){twist();swipeX=x;}
},{passive:false});
cv.addEventListener('touchend',()=>{swipeActive=false;});
cv.addEventListener('mousedown',e=>{if(!('ontouchstart' in window))act();});
btn.addEventListener('touchstart',e=>{e.preventDefault();act();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();act();}
  else if(e.code==='ArrowLeft'||e.code==='ArrowRight'){e.preventDefault();twist();}
});
draw();step();
</script>
